<script>
// ── Lightweight Particle Background ──
(function () {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  let W, H, particles, mouse = { x: -999, y: -999 };
  const COUNT    = 55;   // จำนวน particle (น้อย = ไม่แลค)
  const SPEED    = 0.35;
  const MAX_DIST = 130;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkParticle() {
    const angle = Math.random() * Math.PI * 2;
    const speed = (Math.random() * 0.5 + 0.1) * SPEED;
    return {
      x:  Math.random() * W,
      y:  Math.random() * H,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r:  Math.random() * 1.5 + 0.5,
      a:  Math.random() * 0.5 + 0.2
    };
  }

  function init() {
    resize();
    particles = Array.from({ length: COUNT }, mkParticle);
  }

  function drawOrbs() {
    // วาด glow orbs ขยับช้าๆ
    const t = Date.now() * 0.0003;
    const orbs = [
      { x: 0.25 + Math.sin(t * 0.7) * 0.15, y: 0.3  + Math.cos(t * 0.5) * 0.12, r: 0.35, c: [88,101,242] },
      { x: 0.75 + Math.cos(t * 0.6) * 0.12, y: 0.65 + Math.sin(t * 0.8) * 0.1,  r: 0.28, c: [139,92,246] },
      { x: 0.5  + Math.sin(t * 0.4) * 0.08, y: 0.15 + Math.cos(t * 0.9) * 0.08, r: 0.2,  c: [59,130,246] },
    ];
    orbs.forEach(o => {
      const gx = o.x * W, gy = o.y * H, gr = o.r * Math.max(W, H);
      const g  = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr);
      g.addColorStop(0,   `rgba(${o.c},0.12)`);
      g.addColorStop(1,   `rgba(${o.c},0)`);
      ctx.beginPath();
      ctx.arc(gx, gy, gr, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // วาด orbs
    drawOrbs();

    // อัปเดต + วาด particles
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
    });

    // วาดเส้นเชื่อม
    ctx.lineWidth = 0.4;
    for (let i = 0; i < particles.length; i++) {
      const a = particles[i];
      for (let j = i + 1; j < particles.length; j++) {
        const b   = particles[j];
        const dx  = a.x - b.x, dy = a.y - b.y;
        const d   = Math.sqrt(dx * dx + dy * dy);
        if (d < MAX_DIST) {
          const alpha = (1 - d / MAX_DIST) * 0.25;
          ctx.strokeStyle = `rgba(88,101,242,${alpha})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
      // เส้นเชื่อม mouse
      const mdx = a.x - mouse.x, mdy = a.y - mouse.y;
      const md  = Math.sqrt(mdx * mdx + mdy * mdy);
      if (md < MAX_DIST * 1.4) {
        const alpha = (1 - md / (MAX_DIST * 1.4)) * 0.45;
        ctx.strokeStyle = `rgba(139,92,246,${alpha})`;
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(mouse.x, mouse.y);
        ctx.stroke();
      }

      // วาด dot
      ctx.beginPath();
      ctx.arc(a.x, a.y, a.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,180,255,${a.a})`;
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', () => { resize(); });
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  window.addEventListener('touchmove', e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  }, { passive: true });

  init();
  draw();
})();
</script>

<script src="main.js"></script>
